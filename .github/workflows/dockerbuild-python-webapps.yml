name: Build Python Web Apps Docker

on:
  push:
    paths:
      - "python-webapps/**"
      - ".github/workflows/dockerbuild-python-webapps.yml"
  pull_request:
    paths:
      - "python-webapps/**"
      - ".github/workflows/dockerbuild-python-webapps.yml"

env:
  REPOSITORY_NAME: ritexlabs
  EMAIL_RECIPIENT: ritexlabs@gmail.com

jobs:
  discover-changes:
    runs-on: ubuntu-latest
    outputs:
      app_dirs: ${{ steps.set-matrix.outputs.app_dirs }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build matrix from changed app directories
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          empty_tree_sha="$(git hash-object -t tree /dev/null)"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"

            if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              base_sha="$empty_tree_sha"
            fi
          fi

          changed_dirs=$(git diff --name-only "$base_sha" "$head_sha" -- 'python-webapps/**' \
            | awk -F/ '/^python-webapps\/[^/]+\// {print $1"/"$2}' \
            | sort -u)

          matrix_json="[]"
          if [[ -n "$changed_dirs" ]]; then
            matrix_json="["
            first=true
            while IFS= read -r app_dir; do
              [[ -z "$app_dir" ]] && continue
              if [[ -f "$app_dir/Dockerfile" ]]; then
                if [[ "$first" == true ]]; then
                  first=false
                else
                  matrix_json+="," 
                fi
                matrix_json+="\"$app_dir\""
              fi
            done <<< "$changed_dirs"
            matrix_json+="]"
          fi

          echo "app_dirs=$matrix_json" >> "$GITHUB_OUTPUT"
          if [[ "$matrix_json" == "[]" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed app directories: $matrix_json"

  build-images:
    needs: discover-changes
    if: needs.discover-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app_dir: ${{ fromJson(needs.discover-changes.outputs.app_dirs) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        id: build
        shell: bash
        env:
          APP_DIR: ${{ matrix.app_dir }}
        run: |
          set -euo pipefail

          app_name="$(basename "$APP_DIR")"
          image_repo="${REPOSITORY_NAME}/${app_name}"
          image_tag="${image_repo}:latest"
          should_push="false"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/heads/release/* ]]; then
            version="${GITHUB_REF_NAME#release/}"
            version="${version#v}"
            image_tag="${image_repo}:${version}"
            should_push="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            should_push="true"
          fi

          echo "Building ${image_tag} from ${APP_DIR}"
          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          docker build -t "$image_tag" "$APP_DIR"
          echo "Docker image path: ${image_tag}"
          echo "Pull command: docker pull ${image_tag}"

          if [[ "$should_push" == "true" ]]; then
            echo "Pushing ${image_tag}"
            docker push "$image_tag"
          else
            echo "Skipping push for non-push event"
          fi

      - name: Send Success Email
        if: github.event_name == 'push' && success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Build Succeeded: ${{ github.workflow }} #${{ github.run_number }}"
          to: ${{ env.EMAIL_RECIPIENT }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            🎉 The build completed successfully!
            - Docker Image => ${{ steps.build.outputs.image_tag }}
            - Workflow: ${{ github.workflow }}
            - Run Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Actor: ${{ github.actor }}
            - Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Failure Email
        if: github.event_name == 'push' && failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Build Failed: ${{ github.workflow }} #${{ github.run_number }}"
          to: ${{ env.EMAIL_RECIPIENT }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            🚨 The build has failed.
            - Docker Image => ${{ steps.build.outputs.image_tag }}
            - Workflow: ${{ github.workflow }}
            - Run Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Actor: ${{ github.actor }}
            - Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}