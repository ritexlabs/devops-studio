name: Build Node.js Web Apps Docker

on:
  push:
    paths:
      - "samples-nodejs/**"
      - ".github/workflows/dockerbuild-nodejs-webapps.yml"
  pull_request:
    paths:
      - "samples-nodejs/**"
      - ".github/workflows/dockerbuild-nodejs-webapps.yml"
  workflow_dispatch:

env:
  REPOSITORY_NAME: ritexlabs

jobs:
  discover-changes:
    runs-on: ubuntu-latest
    outputs:
      app_dirs: ${{ steps.set-matrix.outputs.app_dirs }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build matrix from changed app directories
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          empty_tree_sha="$(git hash-object -t tree /dev/null)"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"

            if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              base_sha="$empty_tree_sha"
            fi
          fi

          echo "Diff base: $base_sha"
          echo "Diff head: $head_sha"

          changed_dirs=$(git diff --name-only "$base_sha" "$head_sha" -- samples-nodejs \
            | awk -F/ '/^samples-nodejs\/[^/]+\/[^/]+\// {print $1"/"$2"/"$3}' \
            | sort -u)

          matrix_json="[]"
          selected_dirs="$changed_dirs"

          if [[ -z "$selected_dirs" ]]; then
            selected_dirs=$(find samples-nodejs -type f -name Dockerfile -print \
              | while IFS= read -r dockerfile; do
                  dirname "$dockerfile"
                done \
              | sort -u)
            echo "No changed app directories detected; falling back to all Dockerized Node.js apps."
          fi

          if [[ -n "$selected_dirs" ]]; then
            matrix_json="["
            first=true
            while IFS= read -r app_dir; do
              [[ -z "$app_dir" ]] && continue
              if [[ "$first" == true ]]; then
                first=false
              else
                matrix_json+="," 
              fi
              matrix_json+="\"$app_dir\""
            done <<< "$selected_dirs"
            matrix_json+="]"
          fi

          echo "app_dirs=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Detected changed app directories: ${changed_dirs:-none}"
          echo "Selected app directories for build: $matrix_json"

  build-images:
    needs: discover-changes
    if: needs.discover-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app_dir: ${{ fromJson(needs.discover-changes.outputs.app_dirs) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        id: build
        shell: bash
        env:
          APP_DIR: ${{ matrix.app_dir }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail

          app_name="$(basename "$APP_DIR")"
          image_repo="${REPOSITORY_NAME}/${app_name}"
          image_name="${app_name}"
          image_tag="${image_repo}:latest"
          should_push="false"

          echo "Branch name: ${BRANCH_NAME}"

          if [[ "${BRANCH_NAME}" == release/* ]]; then
            version="${BRANCH_NAME#release/}"
            version="${version#v}"
            image_tag="${image_repo}:${version}"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            should_push="true"
          fi

          echo "Building ${image_tag} from ${APP_DIR}"
          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          docker build -t "$image_tag" "$APP_DIR"
          echo "Docker image path: ${image_tag}"
          echo "Pull command: docker pull ${image_tag}"

          if [[ "$should_push" == "true" ]]; then
            echo "Pushing ${image_tag}"
            docker push "$image_tag"
          else
            echo "Skipping push for non-push event"
          fi

      - name: Print Docker image details
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          echo "Docker image details"
          echo "Branch: ${{ github.ref_name }}"
          echo "Repository: ${{ steps.build.outputs.image_repo }}"
          echo "Image name: ${{ steps.build.outputs.image_name }}"
          echo "Tag: ${{ steps.build.outputs.image_tag }}"
          echo "Full path: ${{ steps.build.outputs.image_tag }}"
          echo "Pull command: docker pull ${{ steps.build.outputs.image_tag }}"

          {
            echo "## Docker Image Details"
            echo ""
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Repository: ${{ steps.build.outputs.image_repo }}"
            echo "- Image name: ${{ steps.build.outputs.image_name }}"
            echo "- Tag: ${{ steps.build.outputs.image_tag }}"
            echo "- Full path: ${{ steps.build.outputs.image_tag }}"
            echo "- Pull command: docker pull ${{ steps.build.outputs.image_tag }}"
          } >> "$GITHUB_STEP_SUMMARY"